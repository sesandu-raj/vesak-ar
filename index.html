<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GPS Location-Based Vesak Lantern</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }
      #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px 20px;
        border-radius: 12px;
        border: 1px solid #ffaa00;
      }
      #ui h1 {
        margin: 0;
        color: #ffcc00;
        font-size: 20px;
      }
      #ui p {
        margin: 8px 0 0;
        font-size: 14px;
        color: #eeeeee;
      }
      .a-enter-vr-button {
        display: none !important;
      }
    </style>
  </head>

  <body>
    <div id="ui">
      <h1>🪔 GPS Atapattama</h1>
      <p>Look around! Placed at specific coordinates.</p>
    </div>

    <a-scene
      vr-mode-ui="enabled: false"
      arjs="sourceType: webcam; videoTexture: true; debugUIEnabled: false;"
    >
      <a-camera gps-camera rotation-reader></a-camera>

      <a-entity
        gps-entity-place="latitude: 6.984767296305048; longitude: 81.07032999769135g;"
        scale="2.05 2.05 2.05"
        position="0 2 0"
      >
        <a-entity
          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear;"
        >
          <a-octahedron
            radius="0.62"
            wireframe="true"
            color="#d4af37"
          ></a-octahedron>
          <a-octahedron
            radius="0.6"
            color="#ffeb99"
            material="opacity: 0.85; transparent: true; emissive: #ff6600; emissiveIntensity: 0.6"
          ></a-octahedron>
          <a-cylinder
            position="0 0.6 0"
            radius="0.1"
            height="0.05"
            color="#cc0000"
          ></a-cylinder>

          <a-entity position="0 -0.6 0">
            <a-cylinder
              position="0 0 0"
              radius="0.1"
              height="0.05"
              color="#cc0000"
            ></a-cylinder>
            <a-cylinder
              position="0 -0.3 0"
              radius="0.015"
              height="0.6"
              color="#ffffff"
            ></a-cylinder>
            <a-cone
              position="0 -0.6 0"
              radius-bottom="0.05"
              radius-top="0.015"
              height="0.15"
              color="#cc0000"
            ></a-cone>
          </a-entity>

          <a-entity position="0.6 0 0"
            ><a-cylinder
              position="0 -0.4 0"
              radius="0.01"
              height="0.8"
              color="#ffffff"
            ></a-cylinder
          ></a-entity>
          <a-entity position="-0.6 0 0"
            ><a-cylinder
              position="0 -0.4 0"
              radius="0.01"
              height="0.8"
              color="#ffffff"
            ></a-cylinder
          ></a-entity>
          <a-entity position="0 0 0.6"
            ><a-cylinder
              position="0 -0.4 0"
              radius="0.01"
              height="0.8"
              color="#ffffff"
            ></a-cylinder
          ></a-entity>
          <a-entity position="0 0 -0.6"
            ><a-cylinder
              position="0 -0.4 0"
              radius="0.01"
              height="0.8"
              color="#ffffff"
            ></a-cylinder
          ></a-entity>
        </a-entity>

        <a-light
          type="point"
          color="#ffaa00"
          position="0 0 0"
          intensity="2"
          animation="property: light.intensity; from: 2; to: 5; dir: alternate; loop: true; dur: 1200; easing: easeInOutSine"
        ></a-light>
        <a-light type="ambient" color="#444"></a-light>

        <a-entity
          animation="property: rotation; to: 0 -360 0; loop: true; dur: 6000; easing: linear;"
        >
          <a-sphere
            position="1.1 0 0"
            radius="0.04"
            color="#ffffcc"
            material="emissive: #ffcc00; emissiveIntensity: 1"
          ></a-sphere>
          <a-sphere
            position="-1.1 0 0"
            radius="0.04"
            color="#ffffcc"
            material="emissive: #ffcc00; emissiveIntensity: 1"
          ></a-sphere>
          <a-sphere
            position="0 0 1.1"
            radius="0.04"
            color="#ffffcc"
            material="emissive: #ffcc00; emissiveIntensity: 1"
          ></a-sphere>
          <a-sphere
            position="0 0 -1.1"
            radius="0.04"
            color="#ffffcc"
            material="emissive: #ffcc00; emissiveIntensity: 1"
          ></a-sphere>
        </a-entity>
      </a-entity>
    </a-scene>
  </body>
</html>
