<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>WebXR Atapattama Vesak Lantern</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }
    body { overflow:hidden; background:#000; font-family:'Cinzel', serif; }

    #ui {
      position:fixed; top:20px; left:20px; z-index:10;
      background:rgba(0,0,0,0.75);
      border:1px solid rgba(0,220,100,0.5);
      box-shadow:0 0 20px rgba(0,255,120,0.2), inset 0 0 20px rgba(0,0,0,0.5);
      padding:16px 22px; border-radius:14px;
      transition:opacity 0.5s;
      backdrop-filter:blur(10px);
    }
    #ui h1 {
      margin:0; color:#00ff88;
      font-family:'Cinzel Decorative', serif;
      font-size:1rem; letter-spacing:.1em;
      text-shadow:0 0 14px rgba(0,255,120,0.8);
    }
    #ui p { margin:6px 0 0; font-size:.75rem; color:#ddd; letter-spacing:.05em; }
    #ui .sub { color:rgba(0,220,100,0.7); font-size:.68rem; margin-top:4px; letter-spacing:.08em; }
  </style>
</head>
<body>

<div id="ui">
  <h1>🪔 Atapattama AR</h1>
  <p>Tap <b style="color:#00ff88">AR</b> button (bottom-right)</p>
  <p class="sub">Lantern appears 4m in front of you</p>
</div>

<!--
  WebXR scene — no marker needed.
  Lantern spawns at position="0 3 -4" (4m ahead, 3m up)
  scale="2 2 2" makes it ~4m tall in real space
-->
<a-scene webxr="referenceSpaceType:local-floor; requiredFeatures:local-floor">

  <!-- ═══════════════════════════════════════════════════
       MASTER LANTERN ANCHOR
       position: 4m in front (z=-4), 1m up (y=1) from floor
       scale: 2x makes each unit = 2m
  ═══════════════════════════════════════════════════ -->
  <a-entity id="lantern-anchor" position="0 1.2 -4" scale="2 2 2">

    <!-- ── Global slow rotation wrapper ── -->
    <a-entity id="spin"
      animation="property:rotation; to:0 360 0; loop:true; dur:25000; easing:linear">

      <!-- ═══════════════════════════════════════
           TIER 1: TOP OCTAGONAL CROWN
           Flat octagonal disc with green glow panels
           + LED spike rays radiating outward
      ═══════════════════════════════════════ -->

      <!-- Top crown disc (dark frame) -->
      <a-cylinder color="#111a11" radius="1.05" height="0.14" position="0 1.85 0"
        material="emissive:#002200; emissiveIntensity:0.3; metalness:0.8; roughness:0.3;">
      </a-cylinder>

      <!-- Green glowing top panels (8 panels of octagon) -->
      <a-plane color="#00ff55" width="0.72" height="0.32" position="1.0 1.85 0"    rotation="0 90 0"  material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="0.707 1.85 0.707" rotation="0 45 0"  material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="0 1.85 1.0"    rotation="0 0 0"   material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="-0.707 1.85 0.707" rotation="0 -45 0" material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="-1.0 1.85 0"   rotation="0 90 0"  material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="-0.707 1.85 -0.707" rotation="0 45 0" material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="0 1.85 -1.0"   rotation="0 0 0"   material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
      <a-plane color="#00ff55" width="0.72" height="0.32" position="0.707 1.85 -0.707" rotation="0 -45 0" material="emissive:#00cc44; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>

      <!-- Top inner glow disc -->
      <a-circle color="#00ff88" radius="0.92" position="0 1.93 0" rotation="-90 0 0"
        material="emissive:#00ff66; emissiveIntensity:1.5; transparent:true; opacity:0.5;"
        animation="property:material.emissiveIntensity; from:1.0; to:2.5; loop:true; dur:1800; dir:alternate; easing:easeInOutSine">
      </a-circle>

      <!-- Bottom ring of top tier -->
      <a-torus color="#1a2a1a" radius="1.0" tube="0.04" position="0 1.78 0" rotation="90 0 0"
        material="emissive:#004400; emissiveIntensity:0.4; metalness:0.9;">
      </a-torus>

      <!-- ── LED SPIKE RAYS (16 spikes radiating from top) ── -->
      <!-- 8 main + 8 between, all tipped with blue LED orbs -->
      <!-- Main 8 spikes (longer) -->
      <a-entity position="0 1.98 0">
        <!-- spike = thin gold rod + blue LED tip -->
        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="1.22 0 0"   rotation="0 0 -78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="1.52 0.1 0" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:600; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="0.863 0 0.863" rotation="0 -45 -78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="1.075 0.1 1.075" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:800; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="0 0 1.22"   rotation="0 0 -78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;" rotation="90 0 -78"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="0 0.1 1.52" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:700; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="-0.863 0 0.863" rotation="0 45 -78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="-1.075 0.1 1.075" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:550; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="-1.22 0 0"  rotation="0 0 78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="-1.52 0.1 0" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:650; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="-0.863 0 -0.863" rotation="0 -45 78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="-1.075 0.1 -1.075" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:900; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="0 0 -1.22"  rotation="90 0 78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="0 0.1 -1.52" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:750; dir:alternate;"></a-sphere>

        <a-cylinder color="#c8a000" radius="0.012" height="0.55" position="0.863 0 -0.863" rotation="0 45 78" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-sphere color="#4488ff" radius="0.045" position="1.075 0.1 -1.075" material="emissive:#2255ff; emissiveIntensity:3;" animation="property:material.emissiveIntensity; from:2; to:4; loop:true; dur:850; dir:alternate;"></a-sphere>
      </a-entity>

      <!-- ═══════════════════════════════════════
           TIER 2: UPPER FUNNEL / TREE PANELS
           Wide-top tapering down — green glowing
           trapezoid panels with cutout pattern
      ═══════════════════════════════════════ -->

      <!-- Funnel frame (dark octagonal cone) -->
      <a-cone color="#0a150a" radius-top="1.0" radius-bottom="0.55" height="0.95" position="0 1.25 0"
        material="emissive:#002200; emissiveIntensity:0.2; metalness:0.7; roughness:0.4; transparent:true; opacity:0.6; side:double;">
      </a-cone>

      <!-- Green glow funnel panels (8 faces, trapezoid approximated with planes) -->
      <a-plane color="#33ff66" width="0.65" height="0.85" position="0.82 1.25 0"      rotation="0 90 0"  material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="0.58 1.25 0.58"   rotation="0 45 0"  material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="0 1.25 0.82"      rotation="0 0 0"   material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="-0.58 1.25 0.58"  rotation="0 -45 0" material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="-0.82 1.25 0"     rotation="0 90 0"  material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="-0.58 1.25 -0.58" rotation="0 45 0"  material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="0 1.25 -0.82"     rotation="0 0 0"   material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>
      <a-plane color="#33ff66" width="0.65" height="0.85" position="0.58 1.25 -0.58"  rotation="0 -45 0" material="emissive:#00cc44; emissiveIntensity:2.2; transparent:true; opacity:0.80; side:double;"></a-plane>

      <!-- Dark carved band between tier1 and tier2 -->
      <a-torus color="#0a150a" radius="0.88" tube="0.055" position="0 0.78 0" rotation="90 0 0"
        material="emissive:#001100; emissiveIntensity:0.2; metalness:0.9;">
      </a-torus>
      <a-cylinder color="#0d1a0d" radius="0.90" height="0.08" position="0 0.78 0"
        material="emissive:#001100; emissiveIntensity:0.2; metalness:0.8;">
      </a-cylinder>

      <!-- ═══════════════════════════════════════
           TIER 3: MIDDLE DRUM + SIDE LANTERNS
           Cylindrical drum section
           + 8 small blue lanterns on arms
      ═══════════════════════════════════════ -->

      <!-- Middle drum dark frame -->
      <a-cylinder color="#0a150a" radius="0.52" height="0.42" position="0 0.52 0"
        material="emissive:#001100; emissiveIntensity:0.2; metalness:0.7;">
      </a-cylinder>

      <!-- Drum green glow panels -->
      <a-plane color="#44ff77" width="0.38" height="0.38" position="0.52 0.52 0"      rotation="0 90 0"  material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="0.368 0.52 0.368" rotation="0 45 0"  material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="0 0.52 0.52"      rotation="0 0 0"   material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="-0.368 0.52 0.368" rotation="0 -45 0" material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="-0.52 0.52 0"     rotation="0 90 0"  material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="-0.368 0.52 -0.368" rotation="0 45 0" material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="0 0.52 -0.52"     rotation="0 0 0"   material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>
      <a-plane color="#44ff77" width="0.38" height="0.38" position="0.368 0.52 -0.368" rotation="0 -45 0" material="emissive:#00cc44; emissiveIntensity:2.0; transparent:true; opacity:0.82; side:double;"></a-plane>

      <!-- Carved decorative bands on drum -->
      <a-torus color="#0a150a" radius="0.53" tube="0.03" position="0 0.70 0" rotation="90 0 0" material="emissive:#001100; emissiveIntensity:0.3; metalness:0.9;"></a-torus>
      <a-torus color="#0a150a" radius="0.53" tube="0.03" position="0 0.34 0" rotation="90 0 0" material="emissive:#001100; emissiveIntensity:0.3; metalness:0.9;"></a-torus>

      <!-- ── 8 SIDE LANTERNS on horizontal arms ── -->
      <!-- Each: arm rod + blue cylindrical lantern + pom-pom + blue fringe -->
      <!-- Side lantern macro placed at 8 positions -->

      <!-- Helper: arm + mini lantern. Placed at radius ~0.92 from centre -->
      <!-- Lantern 1 (0°) -->
      <a-entity position="0 0.52 0">
        <a-cylinder color="#c8a000" radius="0.015" height="0.44" position="0.74 0 0" rotation="0 0 90" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <!-- Mini lantern body -->
        <a-cylinder color="#0a0a2a" radius="0.13" height="0.30" position="0.96 0 0" material="emissive:#000022; emissiveIntensity:0.3; metalness:0.6;"></a-cylinder>
        <!-- Blue glow panels on mini lantern (4 sides) -->
        <a-plane color="#2244ff" width="0.19" height="0.26" position="1.09 0 0"    rotation="0 90 0"  material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.96 0 0.13" rotation="0 0 0"   material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.83 0 0"    rotation="0 90 0"  material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.96 0 -0.13" rotation="0 0 0"  material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <!-- Cap top/bottom -->
        <a-cylinder color="#1a1a1a" radius="0.13" height="0.04" position="0.96 0.17 0" material="emissive:#001100; emissiveIntensity:0.2; metalness:0.8;"></a-cylinder>
        <a-cylinder color="#1a1a1a" radius="0.13" height="0.04" position="0.96 -0.17 0" material="emissive:#001100; emissiveIntensity:0.2; metalness:0.8;"></a-cylinder>
        <!-- Blue fringe tassels -->
        <a-cylinder color="#1144cc" radius="0.006" height="0.18" position="0.88 -0.27 0"  material="emissive:#0033aa; emissiveIntensity:0.5;" animation="property:rotation; from:0 0 -8; to:0 0 8; loop:true; dur:1800; dir:alternate;"></a-cylinder>
        <a-cylinder color="#1144cc" radius="0.006" height="0.18" position="0.96 -0.27 0"  material="emissive:#0033aa; emissiveIntensity:0.5;" animation="property:rotation; from:0 0 8; to:0 0 -8; loop:true; dur:2000; dir:alternate;"></a-cylinder>
        <a-cylinder color="#1144cc" radius="0.006" height="0.18" position="1.04 -0.27 0"  material="emissive:#0033aa; emissiveIntensity:0.5;" animation="property:rotation; from:0 0 -8; to:0 0 8; loop:true; dur:1600; dir:alternate;"></a-cylinder>
        <!-- Blue pom-pom below lantern -->
        <a-sphere color="#1133bb" radius="0.055" position="0.96 -0.48 0" material="emissive:#0022aa; emissiveIntensity:0.8;"
          animation="property:position; from:0.96 -0.46 0; to:0.96 -0.52 0; loop:true; dur:1500; dir:alternate; easing:easeInOutSine">
        </a-sphere>
      </a-entity>

      <!-- Lantern 2 (45°) -->
      <a-entity position="0 0.52 0" rotation="0 45 0">
        <a-cylinder color="#c8a000" radius="0.015" height="0.44" position="0.74 0 0" rotation="0 0 90" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-cylinder color="#0a0a2a" radius="0.13" height="0.30" position="0.96 0 0" material="emissive:#000022; emissiveIntensity:0.3; metalness:0.6;"></a-cylinder>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="1.09 0 0"    rotation="0 90 0"  material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.96 0 0.13" rotation="0 0 0"   material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.83 0 0"    rotation="0 90 0"  material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.96 0 -0.13" rotation="0 0 0"  material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-cylinder color="#1a1a1a" radius="0.13" height="0.04" position="0.96 0.17 0" material="emissive:#001100; emissiveIntensity:0.2; metalness:0.8;"></a-cylinder>
        <a-cylinder color="#1a1a1a" radius="0.13" height="0.04" position="0.96 -0.17 0" material="emissive:#001100; emissiveIntensity:0.2; metalness:0.8;"></a-cylinder>
        <a-cylinder color="#1144cc" radius="0.006" height="0.18" position="0.88 -0.27 0" material="emissive:#0033aa; emissiveIntensity:0.5;" animation="property:rotation; from:0 0 -8; to:0 0 8; loop:true; dur:1900; dir:alternate;"></a-cylinder>
        <a-cylinder color="#1144cc" radius="0.006" height="0.18" position="0.96 -0.27 0" material="emissive:#0033aa; emissiveIntensity:0.5;" animation="property:rotation; from:0 0 8; to:0 0 -8; loop:true; dur:1700; dir:alternate;"></a-cylinder>
        <a-cylinder color="#1144cc" radius="0.006" height="0.18" position="1.04 -0.27 0" material="emissive:#0033aa; emissiveIntensity:0.5;" animation="property:rotation; from:0 0 -8; to:0 0 8; loop:true; dur:2100; dir:alternate;"></a-cylinder>
        <a-sphere color="#1133bb" radius="0.055" position="0.96 -0.48 0" material="emissive:#0022aa; emissiveIntensity:0.8;"
          animation="property:position; from:0.96 -0.46 0; to:0.96 -0.52 0; loop:true; dur:1700; dir:alternate; easing:easeInOutSine">
        </a-sphere>
      </a-entity>

      <!-- Lanterns 3-8 (90°, 135°, 180°, 225°, 270°, 315°) — same template, different rotation -->
      <a-entity position="0 0.52 0" rotation="0 90 0">
        <a-cylinder color="#c8a000" radius="0.015" height="0.44" position="0.74 0 0" rotation="0 0 90" material="emissive:#886600; emissiveIntensity:0.5; metalness:0.9;"></a-cylinder>
        <a-cylinder color="#0a0a2a" radius="0.13" height="0.30" position="0.96 0 0" material="emissive:#000022; emissiveIntensity:0.3;"></a-cylinder>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="1.09 0 0" rotation="0 90 0" material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
        <a-plane color="#2244ff" width="0.19" height="0.26" position="0.83 0 0" rotation="0 90 0" material="emissive:#1133cc; emissiveIntensity:2.5; transparent:true; opacity:0.85; side:double;"></a-plane>
