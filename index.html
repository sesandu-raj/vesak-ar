<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WebAR Custom Illuminated Atapattama</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
      }

      #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 15px 20px;
        border-radius: 12px;
        border: 1px solid #ffaa00;
        box-shadow: 0 4px 15px rgba(255, 170, 0, 0.3);
      }

      #ui h1 {
        margin: 0;
        color: #ffcc00;
        font-size: 20px;
      }
      #ui p {
        margin: 8px 0 0;
        font-size: 14px;
        color: #eeeeee;
        line-height: 1.4;
      }

      /* Confusing VR button hidden. AR button visible. */
      .a-enter-vr-button {
        display: none !important;
      }
      .a-enter-ar-button {
        display: block !important;
      }
    </style>

    <script>
      // Simplified script to update instructions when placement succeeds
      AFRAME.registerComponent("ar-instructions", {
        init: function () {
          this.el.addEventListener("ar-hit-test-select", function () {
            document.getElementById("instruction").innerHTML =
              "Lantern placed! Take a step back and look around it.";
          });
        },
      });

      // Tiny helper to create the fringing texture pattern on untextured primitives
      AFRAME.registerComponent("simulate-pattern", {
        init: function () {
          // This simply makes the geometry multi-faceted, better than nothing
          this.el.setAttribute("geometry", { radialSegments: 8 });
        },
      });
    </script>
  </head>

  <body>
    <div id="ui">
      <h1>🪔 WebAR Atapattama</h1>
      <p id="instruction">
        1. Point phone at floor and move slowly.<br />2. When you see the aiming
        square stick to ground, <b>TAP</b> to place.<br /><i
          >(Requires HTTPS connection)</i
        >
      </p>
    </div>

    <a-scene
      webxr="requiredFeatures: hit-test, local-floor"
      ar-hit-test="target: #lantern; type: map;"
      ar-instructions
      renderer="colorManagement: true;"
    >
      <a-assets> </a-assets>

      <a-entity id="lantern" visible="false" position="0 2 0" scale="1 1 1">
        <a-entity
          animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear;"
          position="0 -2 0"
        >
          <a-entity id="primitive-design" scale="1.3 1.3 1.3">
            <a-octahedron
              position="0 -1.5 0"
              radius="0.8"
              simulate-pattern
              material="color: darkgreen; emissive: #00ff00; emissiveIntensity: 2; transparent: true; opacity: 0.95"
            ></a-octahedron>
            <a-torus
              position="0 -1.5 0"
              radius="0.75"
              radius-tubular="0.01"
              rotation="90 0 0"
              material="color: #ffcc00; emissive: #ffaa00; emissiveIntensity: 1;"
            ></a-torus>
            <a-torus
              position="0 -1.5 0"
              radius="0.75"
              radius-tubular="0.01"
              rotation="0 0 0"
              material="color: #ffcc00; emissive: #ffaa00; emissiveIntensity: 1;"
            ></a-torus>

            <a-cylinder
              position="0 -0.5 0"
              height="1"
              radius-bottom="0.8"
              radius-top="0.4"
              simulate-pattern
              material="color: darkgreen; emissive: #00ff00; emissiveIntensity: 3"
            ></a-cylinder>

            <a-entity position="0 -0.2 0">
              <a-cylinder
                height="2.2"
                radius="0.02"
                color="#daa520"
                rotation="0 0 90"
              ></a-cylinder>
              <a-cylinder
                height="2.2"
                radius="0.02"
                color="#daa520"
                rotation="90 0 90"
              ></a-cylinder>
            </a-entity>

            <a-cylinder
              position="0 0.5 0"
              height="1.1"
              radius-bottom="0.4"
              radius-top="1.1"
              simulate-pattern
              material="color: darkgreen; emissive: #00ff00; emissiveIntensity: 3"
            ></a-cylinder>

            <a-octahedron
              position="0 1.5 0"
              radius="1.3"
              simulate-pattern
              material="color: darkgreen; emissive: #00ff00; emissiveIntensity: 3; transparent: true; opacity: 0.9"
            ></a-octahedron>

            <a-entity position="0 2.2 0">
              <a-entity rotation="0 0 0">
                <a-cylinder
                  height="0.8"
                  radius="0.02"
                  color="#daa520"
                  position="0 -0.4 1.2"
                  rotation="-40 0 0"
                ></a-cylinder>
                <a-sphere
                  radius="0.05"
                  position="0 0.05 1.45"
                  color="#00ffcc"
                  material="emissive: #00ffcc; emissiveIntensity: 1"
                ></a-sphere>
              </a-entity>
              <a-entity rotation="0 90 0">
                <a-cylinder
                  height="0.8"
                  radius="0.02"
                  color="#daa520"
                  position="0 -0.4 1.2"
                  rotation="-40 0 0"
                ></a-cylinder>
                <a-sphere
                  radius="0.05"
                  position="0 0.05 1.45"
                  color="#00ffcc"
                  material="emissive: #00ffcc; emissiveIntensity: 1"
                ></a-sphere>
              </a-entity>
              <a-entity rotation="0 180 0">
                <a-cylinder
                  height="0.8"
                  radius="0.02"
                  color="#daa520"
                  position="0 -0.4 1.2"
                  rotation="-40 0 0"
                ></a-cylinder>
                <a-sphere
                  radius="0.05"
                  position="0 0.05 1.45"
                  color="#00ffcc"
                  material="emissive: #00ffcc; emissiveIntensity: 1"
                ></a-sphere>
              </a-entity>
              <a-entity rotation="0 -90 0">
                <a-cylinder
                  height="0.8"
                  radius="0.02"
                  color="#daa520"
                  position="0 -0.4 1.2"
                  rotation="-40 0 0"
                ></a-cylinder>
                <a-sphere
                  radius="0.05"
                  position="0 0.05 1.45"
                  color="#00ffcc"
                  material="emissive: #00ffcc; emissiveIntensity: 1"
                ></a-sphere>
              </a-entity>
            </a-entity>

            <a-entity id="mini-lanterns-group">
              <a-entity position="0 -0.2 1.1">
                <a-sphere
                  position="0 0.25 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
                <a-box
                  height="0.6"
                  width="0.4"
                  depth="0.4"
                  simulate-pattern
                  material="color: darkblue; emissive: cyan; emissiveIntensity: 3"
                ></a-box>
                <a-cylinder
                  position="0 -0.3 0"
                  height="0.4"
                  radius="0.18"
                  open-ended="true"
                  radial-segments="200"
                  material="opacity: 0.8; transparent: true; color: blue; emissive: cyan; emissiveIntensity: 1;"
                ></a-cylinder>
                <a-sphere
                  position="0 -0.7 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
              </a-entity>

              <a-entity position="1.1 -0.2 0" rotation="0 90 0">
                <a-sphere
                  position="0 0.25 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
                <a-box
                  height="0.6"
                  width="0.4"
                  depth="0.4"
                  simulate-pattern
                  material="color: darkblue; emissive: cyan; emissiveIntensity: 3"
                ></a-box>
                <a-cylinder
                  position="0 -0.3 0"
                  height="0.4"
                  radius="0.18"
                  open-ended="true"
                  radial-segments="200"
                  material="opacity: 0.8; transparent: true; color: blue; emissive: cyan; emissiveIntensity: 1;"
                ></a-cylinder>
                <a-sphere
                  position="0 -0.7 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
              </a-entity>

              <a-entity position="0 -0.2 -1.1" rotation="0 180 0">
                <a-sphere
                  position="0 0.25 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
                <a-box
                  height="0.6"
                  width="0.4"
                  depth="0.4"
                  simulate-pattern
                  material="color: darkblue; emissive: cyan; emissiveIntensity: 3"
                ></a-box>
                <a-cylinder
                  position="0 -0.3 0"
                  height="0.4"
                  radius="0.18"
                  open-ended="true"
                  radial-segments="200"
                  material="opacity: 0.8; transparent: true; color: blue; emissive: cyan; emissiveIntensity: 1;"
                ></a-cylinder>
                <a-sphere
                  position="0 -0.7 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
              </a-entity>

              <a-entity position="-1.1 -0.2 0" rotation="0 -90 0">
                <a-sphere
                  position="0 0.25 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
                <a-box
                  height="0.6"
                  width="0.4"
                  depth="0.4"
                  simulate-pattern
                  material="color: darkblue; emissive: cyan; emissiveIntensity: 3"
                ></a-box>
                <a-cylinder
                  position="0 -0.3 0"
                  height="0.4"
                  radius="0.18"
                  open-ended="true"
                  radial-segments="200"
                  material="opacity: 0.8; transparent: true; color: blue; emissive: cyan; emissiveIntensity: 1;"
                ></a-cylinder>
                <a-sphere
                  position="0 -0.7 0"
                  radius="0.08"
                  color="#0000ff"
                  material="emissive: cyan; emissiveIntensity: 1;"
                ></a-sphere>
              </a-entity>
            </a-entity>

            <a-entity position="0 -2.4 0">
              <a-cylinder
                height="0.1"
                radius="1.3"
                radial-segments="8"
                material="color: #666; emissive: #ffffff; emissiveIntensity: 1;"
              ></a-cylinder>
              <a-torus
                radius="1.1"
                radius-tubular="0.005"
                color="#daa520"
                rotation="90 0 0"
                material="emissive: #ffaa00; emissiveIntensity: 0.5"
              ></a-torus>
              <a-cylinder
                position="0 -0.2 0"
                height="0.5"
                radius="1.31"
                open-ended="true"
                radial-segments="300"
                material="opacity: 0.8; transparent: true; color: blue; emissive: cyan; emissiveIntensity: 1;"
              ></a-cylinder>
            </a-entity>
          </a-entity>
        </a-entity>

        <a-light
          type="point"
          color="#00ffcc"
          position="0 1 0"
          intensity="1"
        ></a-light>
        <a-light type="ambient" color="#333"></a-light>
      </a-entity>
    </a-scene>
  </body>
</html>
