<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Instant Spawn Vesak Lantern</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: sans-serif; }
      #ui {
        position: fixed; top: 20px; left: 20px; z-index: 10;
        background: rgba(0, 0, 0, 0.7); color: #00ffcc;
        padding: 15px; border-radius: 10px; border: 1px solid #00ffcc;
      }
      .a-enter-vr-button { display: none; }
    </style>
  </head>

  <body>
    <div id="ui">
      <b>🪔 4m Traditional Atapattama</b><br>
      Look straight ahead. It is 4m away!
    </div>

    <a-scene webxr="optionalFeatures: local-floor;">
      
      <a-entity id="lantern-anchor" position="0 0 -4" scale="1.5 1.5 1.5">
          
        <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear;">
          
          <a-entity position="0 2.5 0">
            <a-octahedron radius="1" material="color: #004d00; emissive: #00ff00; emissiveIntensity: 1; opacity: 0.9; transparent: true"></a-octahedron>
            <a-entity rotation="0 0 0">
                <a-cylinder position="0 0.5 0.8" rotation="45 0 0" height="0.6" radius="0.02" color="#daa520"></a-cylinder>
                <a-sphere position="0 0.8 1.1" radius="0.06" color="#00ffff" material="emissive: #00ffff"></a-sphere>
            </a-entity>
          </a-entity>

          <a-cylinder position="0 1.2 0" height="1.5" radius-bottom="0.4" radius-top="1" segments-radial="8" material="color: #002200; emissive: #00ff00; emissiveIntensity: 0.5"></a-cylinder>

          <a-entity id="side-lanterns">
            <a-entity position="0 1.2 1.2">
              <a-box width="0.4" height="0.6" depth="0.4" material="color: #000066; emissive: #0099ff; emissiveIntensity: 1"></a-box>
              <a-cylinder position="0 -0.4 0" height="0.4" radius="0.2" open-ended="true" color="blue" material="opacity: 0.6; transparent: true"></a-cylinder>
            </a-entity>
            <a-entity position="1.2 1.2 0" rotation="0 90 0">
              <a-box width="0.4" height="0.6" depth="0.4" material="color: #000066; emissive: #0099ff; emissiveIntensity: 1"></a-box>
              <a-cylinder position="0 -0.4 0" height="0.4" radius="0.2" open-ended="true" color="blue" material="opacity: 0.6; transparent: true"></a-cylinder>
            </a-entity>
            <a-entity position="0 1.2 -1.2" rotation="0 180 0">
              <a-box width="0.4" height="0.6" depth="0.4" material="color: #000066; emissive: #0099ff; emissiveIntensity: 1"></a-box>
              <a-cylinder position="0 -0.4 0" height="0.4" radius="0.2" open-ended="true" color="blue" material="opacity: 0.6; transparent: true"></a-cylinder>
            </a-entity>
            <a-entity position="-1.2 1.2 0" rotation="0 270 0">
              <a-box width="0.4" height="0.6" depth="0.4" material="color: #000066; emissive: #0099ff; emissiveIntensity: 1"></a-box>
              <a-cylinder position="0 -0.4 0" height="0.4" radius="0.2" open-ended="true" color="blue" material="opacity: 0.6; transparent: true"></a-cylinder>
            </a-entity>
          </a-entity>

          <a-entity position="0 0 0">
            <a-octahedron radius="0.8" material="color: #1a0033; emissive: #9900ff; emissiveIntensity: 0.6"></a-octahedron>
            <a-sphere position="0.6 -0.6 0.6" radius="0.08" color="#00ffff"></a-sphere>
            <a-sphere position="-0.6 -0.6 -0.6" radius="0.08" color="#00ffff"></a-sphere>
          </a-entity>

          <a-entity position="0 -0.8 0">
            <a-cylinder segments-radial="8" height="0.1" radius="1.2" color="#333"></a-cylinder>
            <a-cylinder position="0 -0.3 0" height="0.6" radius="1.21" open-ended="true" material="color: blue; opacity: 0.5; transparent: true"></a-cylinder>
          </a-entity>

        </a-entity> <a-light type="point" intensity="2" color="#00ffcc" position="0 1.5 0"></a-light>
      </a-entity>

      <a-light type="ambient" intensity="0.5" color="#fff"></a-light>
      
      <a-camera position="0 1.6 0"></a-camera>
    </a-scene>
  </body>
</html>
