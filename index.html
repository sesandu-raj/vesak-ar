<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebXR · Vesak Lantern (Atapattama)</title>
  
  <!-- A-Frame core -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }
    #ui {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 10;
      background: rgba(10, 10, 20, 0.8);
      backdrop-filter: blur(4px);
      color: #f0f5ff;
      padding: 18px 24px;
      border-radius: 28px;
      border: 1px solid rgba(255, 200, 50, 0.6);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
      pointer-events: none;
      transition: opacity 0.4s;
      max-width: 300px;
    }
    #ui h1 {
      margin: 0;
      font-weight: 500;
      font-size: 1.6rem;
      color: #ffe07a;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #ui p {
      margin: 10px 0 0;
      font-size: 0.9rem;
      opacity: 0.9;
      line-height: 1.4;
    }
    #ui .badge {
      background: #ffb347;
      color: #111;
      border-radius: 40px;
      padding: 0 12px;
      font-size: 0.7rem;
      font-weight: bold;
      display: inline-block;
      margin-top: 6px;
    }
    @media (max-width: 600px) {
      #ui { top: 10px; left: 10px; padding: 12px 16px; }
      #ui h1 { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <h1>🪔 Atapattama</h1>
    <p>Vesak lantern · <span style="color:#ffd966;">AR ready</span></p>
    <span class="badge">tap bottom-right AR</span>
  </div>

  <a-scene webxr="referenceSpaceType: local-floor; requiredFeatures: local-floor">
    <!-- ambient + subtle fill -->
    <a-light type="ambient" color="#2a2a3a" intensity="0.6"></a-light>
    <a-light type="directional" position="1 3 2" color="#ffeedd" intensity="0.8"></a-light>

    <!-- MAIN LANTERN: positioned 4m in front of user (x:0, z:-4) -->
    <a-entity position="0 2.0 -4" scale="1.8 1.8 1.8">
      
      <!-- whole lantern rotates slowly -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear;">
        
        <!-- ========== BASE / PEDESTAL (hexagonal) ========== -->
        <a-entity position="0 -0.55 0">
          <!-- main floor disc -->
          <a-cylinder radius="0.85" height="0.08" color="#1e2b1f" material="roughness:0.7; metalness:0.2"></a-cylinder>
          <!-- cutout patterns: a ring of small cylinders to simulate perforations -->
          <a-entity position="0 0.05 0" rotation="0 0 0">
            <!-- using a ring of cylinders for decorative floor holes -->
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="0.65 0 0"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="-0.65 0 0"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="0 0 0.65"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="0 0 -0.65"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="0.46 0 0.46"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="-0.46 0 -0.46"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="0.46 0 -0.46"></a-cylinder>
            <a-cylinder radius="0.02" height="0.1" color="#ffdb7c" material="emissive: #f0b34b; emissiveIntensity: 2" position="-0.46 0 0.46"></a-cylinder>
          </a-entity>
          
          <!-- skirt / fringe (blue) -->
          <a-entity position="0 -0.12 0">
            <a-cylinder radius="0.86" height="0.04" color="#1c3a5c" material="emissive: #0f2b4a; emissiveIntensity: 0.6"></a-cylinder>
            <!-- fringe cylinders -->
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="0.82 -0.08 0"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="-0.82 -0.08 0"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="0  -0.08 0.82"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="0  -0.08 -0.82"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="0.58 -0.08 0.58"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="-0.58 -0.08 -0.58"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="0.58 -0.08 -0.58"></a-cylinder>
            <a-cylinder radius="0.02" height="0.12" color="#1f4a7a" position="-0.58 -0.08 0.58"></a-cylinder>
          </a-entity>
        </a-entity>

        <!-- ========== LOWER BULB (hexagonal lantern body) ========== -->
        <a-entity position="0 -0.3 0">
          <!-- two octahedrons create the faceted lower section -->
          <a-octahedron radius="0.45" color="#2c7a2c" material="wireframe: false; emissive: #1f6b1f; emissiveIntensity: 0.9; opacity: 0.85; transparent: true"></a-octahedron>
          <a-octahedron radius="0.44" color="#4ca84c" material="emissive: #7acf4a; emissiveIntensity: 1.2; opacity: 0.4; transparent: true"></a-octahedron>
          <!-- decorative ridges / filigree -->
          <a-entity rotation="0 30 0">
            <a-box position="0.38 0 0" scale="0.02 0.12 0.02" color="#e6c87a"></a-box>
            <a-box position="-0.38 0 0" scale="0.02 0.12 0.02" color="#e6c87a"></a-box>
            <a-box position="0 0 0.38" scale="0.02 0.12 0.02" color="#e6c87a"></a-box>
            <a-box position="0 0 -0.38" scale="0.02 0.12 0.02" color="#e6c87a"></a-box>
          </a-entity>
        </a-entity>

        <!-- ========== MIDDLE RING / connecting frame ========== -->
        <a-entity position="0 0.0 0">
          <a-ring radius-inner="0.25" radius-outer="0.35" color="#3b5e3b" material="emissive: #2b4a2b; emissiveIntensity: 0.5"></a-ring>
          <!-- small decorative pom-poms (blue) -->
          <a-sphere radius="0.07" color="#3f7fb0" material="emissive: #1a4f7a; emissiveIntensity: 0.6" position="0.4 0.1 0"></a-sphere>
          <a-sphere radius="0.07" color="#3f7fb0" material="emissive: #1a4f7a; emissiveIntensity: 0.6" position="-0.4 0.1 0"></a-sphere>
          <a-sphere radius="0.07" color="#3f7fb0" material="emissive: #1a4f7a; emissiveIntensity: 0.6" position="0 0.1 0.4"></a-sphere>
          <a-sphere radius="0.07" color="#3f7fb0" material="emissive: #1a4f7a; emissiveIntensity: 0.6" position="0 0.1 -0.4"></a-sphere>
        </a-entity>

        <!-- ========== HANGING LAMPS (4 small blue lanterns) ========== -->
        <!-- lamp 1 -->
        <a-entity position="0.65 0.05 0">
          <a-cylinder radius="0.12" height="0.18" color="#1f4f7a" material="emissive: #2a6b9e; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.08" height="0.04" color="#d4af37" position="0 0.11 0"></a-cylinder>
          <a-cylinder radius="0.02" height="0.14" color="#b0c4de" position="0 -0.06 0"></a-cylinder>
          <a-sphere radius="0.05" color="#2f7fb0" position="0 -0.15 0"></a-sphere>
        </a-entity>
        <!-- lamp 2 -->
        <a-entity position="-0.65 0.05 0">
          <a-cylinder radius="0.12" height="0.18" color="#1f4f7a" material="emissive: #2a6b9e; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.08" height="0.04" color="#d4af37" position="0 0.11 0"></a-cylinder>
          <a-cylinder radius="0.02" height="0.14" color="#b0c4de" position="0 -0.06 0"></a-cylinder>
          <a-sphere radius="0.05" color="#2f7fb0" position="0 -0.15 0"></a-sphere>
        </a-entity>
        <!-- lamp 3 -->
        <a-entity position="0 0.05 0.65">
          <a-cylinder radius="0.12" height="0.18" color="#1f4f7a" material="emissive: #2a6b9e; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.08" height="0.04" color="#d4af37" position="0 0.11 0"></a-cylinder>
          <a-cylinder radius="0.02" height="0.14" color="#b0c4de" position="0 -0.06 0"></a-cylinder>
          <a-sphere radius="0.05" color="#2f7fb0" position="0 -0.15 0"></a-sphere>
        </a-entity>
        <!-- lamp 4 -->
        <a-entity position="0 0.05 -0.65">
          <a-cylinder radius="0.12" height="0.18" color="#1f4f7a" material="emissive: #2a6b9e; emissiveIntensity: 1.2"></a-cylinder>
          <a-cylinder radius="0.08" height="0.04" color="#d4af37" position="0 0.11 0"></a-cylinder>
          <a-cylinder radius="0.02" height="0.14" color="#b0c4de" position="0 -0.06 0"></a-cylinder>
          <a-sphere radius="0.05" color="#2f7fb0" position="0 -0.15 0"></a-sphere>
        </a-entity>
        <!-- connecting bars to lamps -->
        <a-entity position="0 0.15 0">
          <a-cylinder radius="0.01" height="0.5" color="#b8913a" rotation="0 0 90" position="0.35 0 0"></a-cylinder>
          <a-cylinder radius="0.01" height="0.5" color="#b8913a" rotation="0 0 -90" position="-0.35 0 0"></a-cylinder>
          <a-cylinder radius="0.01" height="0.5" color="#b8913a" rotation="90 0 0" position="0 0 0.35"></a-cylinder>
          <a-cylinder radius="0.01" height="0.5" color="#b8913a" rotation="-90 0 0" position="0 0 -0.35"></a-cylinder>
        </a-entity>

        <!-- ========== UPPER BODY (tapered, with tree motifs) ========== -->
        <a-entity position="0 0.35 0">
          <!-- main tapered cylinder -->
          <a-cylinder radius-top="0.28" radius-bottom="0.45" height="0.55" color="#1f5c2a" material="emissive: #2d7a3a; emissiveIntensity: 0.7"></a-cylinder>
          <!-- ornamental tree cutouts (green glowing) -->
          <a-entity position="0 0.1 0" rotation="0 0 0">
            <a-plane width="0.15" height="0.2" color="#67d96a" material="emissive: #5fcf5f; emissiveIntensity: 2; transparent: true; opacity: 0.9" position="0.38 0.15 0"></a-plane>
            <a-plane width="0.15" height="0.2" color="#67d96a" material="emissive: #5fcf5f; emissiveIntensity: 2; transparent: true; opacity: 0.9" position="-0.38 0.15 0"></a-plane>
            <a-plane width="0.15" height="0.2" color="#67d96a" material="emissive: #5fcf5f; emissiveIntensity: 2; transparent: true; opacity: 0.9" position="0 0.15 0.38"></a-plane>
            <a-plane width="0.15" height="0.2" color="#67d96a" material="emissive: #5fcf5f; emissiveIntensity: 2; transparent: true; opacity: 0.9" position="0 0.15 -0.38"></a-plane>
          </a-entity>
        </a-entity>

        <!-- ========== TOP CANOPY (hexagonal roof) ========== -->
        <a-entity position="0 0.7 0">
          <!-- main disc -->
          <a-cylinder radius="0.6" height="0.06" color="#1f3a1f" material="emissive: #2c572c; emissiveIntensity: 0.3"></a-cylinder>
          <!-- edge decoration (green filigree) -->
          <a-entity rotation="0 0 0">
            <a-box scale="0.3 0.02 0.02" color="#b7e34d" position="0.55 0.04 0"></a-box>
            <a-box scale="0.3 0.02 0.02" color="#b7e34d" position="-0.55 0.04 0"></a-box>
            <a-box scale="0.3 0.02 0.02" color="#b7e34d" position="0 0.04 0.55"></a-box>
            <a-box scale="0.3 0.02 0.02" color="#b7e34d" position="0 0.04 -0.55"></a-box>
          </a-entity>
          <!-- upper spikes / pins -->
          <a-entity position="0 0.12 0">
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="0.4 0.08 0"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="-0.4 0.08 0"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="0 0.08 0.4"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="0 0.08 -0.4"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="0.28 0.08 0.28"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="-0.28 0.08 -0.28"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="0.28 0.08 -0.28"></a-cylinder>
            <a-cylinder radius="0.008" height="0.25" color="#f5e56b" material="emissive: #f0d54a; emissiveIntensity: 1.5" position="-0.28 0.08 0.28"></a-cylinder>
          </a-entity>
          <!-- topmost finial -->
          <a-sphere radius="0.07" color="#d4af37" position="0 0.22 0"></a-sphere>
          <a-cylinder radius="0.02" height="0.1" color="#d4af37" position="0 0.31 0"></a-cylinder>
        </a-entity>

        <!-- ========== FLOATING ORBS / GLOW ========== -->
        <a-entity animation="property: rotation; to: 0 -360 0; loop: true; dur: 7000; easing: linear;">
          <a-sphere radius="0.045" color="#ffdd77" material="emissive: #ffb347; emissiveIntensity: 3" position="0.9 0.2 0"></a-sphere>
          <a-sphere radius="0.045" color="#ffdd77" material="emissive: #ffb347; emissiveIntensity: 3" position="-0.9 0.2 0"></a-sphere>
          <a-sphere radius="0.045" color="#ffdd77" material="emissive: #ffb347; emissiveIntensity: 3" position="0 0.2 0.9"></a-sphere>
          <a-sphere radius="0.045" color="#ffdd77" material="emissive: #ffb347; emissiveIntensity: 3" position="0 0.2 -0.9"></a-sphere>
        </a-entity>
      </a-entity>

      <!-- central glow / point light -->
      <a-light type="point" color="#ffbb44" position="0 0.5 0" intensity="1.8" animation="property: light.intensity; from: 1.8; to: 3.5; dir: alternate; loop: true; dur: 1800; easing: easeInOutSine"></a-light>
      <a-light type="point" color="#44aaff" position="0 -0.2 0" intensity="0.6"></a-light>
    </a-entity>

    <!-- backdrop / stars (optional but helps AR presence) -->
    <a-entity position="0 0 -10">
      <a-sphere radius="0.06" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.4" position="-2 1 0"></a-sphere>
      <a-sphere radius="0.04" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.4" position="2.5 0.5 -2"></a-sphere>
      <a-sphere radius="0.05" color="#ffffff" material="emissive: #ffffff; emissiveIntensity: 0.4" position="-1.5 -0.5 -3"></a-sphere>
    </a-entity>

  </a-scene>

  <script>
    (function() {
      const scene = document.querySelector('a-scene');
      const ui = document.getElementById('ui');
      
      // when entering VR/AR, hide UI overlay
      scene.addEventListener('enter-vr', function() {
        ui.style.opacity = '0';
        setTimeout(() => { ui.style.display = 'none'; }, 300);
      });
      
      scene.addEventListener('exit-vr', function() {
        ui.style.display = 'block';
        setTimeout(() => { ui.style.opacity = '1'; }, 50);
      });
    })();
  </script>
</body>
</html>
