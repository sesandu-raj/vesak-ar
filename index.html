<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>WebXR Vesak Lantern</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:Georgia,serif; }
    #ui {
      position:fixed; top:20px; left:20px; z-index:10;
      background:rgba(0,0,0,0.7); color:#fff;
      padding:14px 20px; border-radius:12px;
      border:1px solid rgba(255,200,0,0.5);
      transition:opacity 0.5s;
    }
    #ui h1 { margin:0; color:#ffd700; font-size:1rem; letter-spacing:.08em; }
    #ui p  { margin:6px 0 0; font-size:.75rem; color:#ddd; }
    #ui .sub { color:rgba(255,200,0,0.6); font-size:.68rem; margin-top:3px; }
  </style>
</head>
<body>
<div id="ui">
  <h1>🪔 Vesak Lantern AR</h1>
  <p>Tap <b style="color:#ffd700">AR</b> button (bottom-right)</p>
  <p class="sub">Lantern appears 4 m in front of you</p>
</div>

<a-scene webxr="referenceSpaceType:local-floor; requiredFeatures:local-floor">

  <a-assets>
    <a-asset-item id="lantern-glb" src="lantern.glb"></a-asset-item>
  </a-assets>

  <!-- Lantern: 4 metres in front, 1m up, scaled to ~1.5m tall -->
  <a-gltf-model
    src="#lantern-glb"
    position="0 1.2 -4"
    scale="1.5 1.5 1.5"
    animation="property:rotation; to:0 360 0; loop:true; dur:12000; easing:linear"
    animation__float="property:position; from:0 1.0 -4; to:0 1.4 -4; loop:true; dur:2500; dir:alternate; easing:easeInOutSine">
  </a-gltf-model>

  <!-- Warm point light at lantern position -->
  <a-light type="point" color="#ffcc44" intensity="3" distance="6" position="0 1.2 -4"
    animation="property:intensity; from:2; to:5; loop:true; dur:800; dir:alternate; easing:easeInOutSine">
  </a-light>

  <a-light type="ambient" color="#ffddaa" intensity="0.4"></a-light>
  <a-entity camera></a-entity>
</a-scene>

<script>
  const scene = document.querySelector('a-scene');
  const ui    = document.getElementById('ui');
  scene.addEventListener('enter-vr', () => ui.style.display = 'none');
  scene.addEventListener('exit-vr',  () => ui.style.display = 'block');
</script>
</body>
</html>
