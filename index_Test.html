<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vesak AR Lantern</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial;
      }

      .overlay {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;

        background: rgba(0, 0, 0, 0.6);
        color: white;

        padding: 12px 16px;
        border-radius: 10px;
      }

      .overlay h1 {
        margin: 0;
        color: gold;
        font-size: 18px;
      }

      .overlay p {
        margin: 5px 0 0;
        font-size: 13px;
      }
    </style>
  </head>

  <body>
    <div class="overlay">
      <h1>🪔 Vesak AR</h1>
      <p>Point camera at Hiro marker</p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      <!-- HIRO MARKER -->
      <a-marker preset="hiro">
        <!-- LANTERN -->
        <a-entity
          animation="property: rotation; to: 0 360 0; loop: true; dur: 5000"
        >
          <!-- MAIN BODY -->
          <a-octahedron
            position="0 0.5 0"
            radius="0.4"
            color="#ff6600"
            material="emissive: #ff3300"
          ></a-octahedron>

          <!-- TOP -->
          <a-cylinder
            position="0 1 0"
            radius="0.08"
            height="0.15"
            color="gold"
          ></a-cylinder>

          <!-- BOTTOM -->
          <a-cylinder
            position="0 0 0"
            radius="0.08"
            height="0.15"
            color="gold"
          ></a-cylinder>

          <!-- LIGHT -->
          <a-light
            type="point"
            color="#ffaa00"
            intensity="2"
            position="0 0.5 0"
          ></a-light>
        </a-entity>
      </a-marker>

      <!-- CAMERA -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
