<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vesak AR Lantern</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      body {
        margin: 0;
        overflow: hidden;
        font-family: Arial, sans-serif;
        background: black;
      }

      .overlay {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 10;

        background: rgba(0, 0, 0, 0.6);
        color: white;

        padding: 14px 18px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
      }

      .overlay h1 {
        margin: 0;
        color: gold;
        font-size: 20px;
      }

      .overlay p {
        margin-top: 5px;
        font-size: 13px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="overlay">
      <h1>🪔 Vesak AR Lantern</h1>
      <p>Point camera at Hiro marker</p>
    </div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <!-- MARKER -->
      <a-marker preset="hiro">
        <!-- ENTIRE LANTERN -->
        <a-entity
          position="0 0.5 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
          animation__float="property: position; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true; to: 0 0.6 0"
        >
          <!-- TOP HOLDER -->
          <a-cylinder
            position="0 0.75 0"
            radius="0.05"
            height="0.12"
            color="#FFD700"
          ></a-cylinder>

          <!-- TOP RING -->
          <a-torus
            position="0 0.65 0"
            radius="0.18"
            radius-tubular="0.01"
            color="#FFD700"
            rotation="90 0 0"
          ></a-torus>
          <!-- MAIN BODY -->
          <a-octahedron
            radius="0.35"
            color="#ff6600"
            material="
          emissive: #ff3300;
          emissiveIntensity: 1.8;
          metalness: 0.2;
          roughness: 0.3;
          opacity: 0.95;
          transparent: true;
        "
          ></a-octahedron>

          <!-- INNER GLOW -->
          <a-sphere
            radius="0.18"
            color="#FFD54A"
            material="
          emissive: #ffcc00;
          emissiveIntensity: 4;
          opacity: 0.65;
          transparent: true;
        "
            animation="property: scale; dir: alternate; dur: 1500; loop: true; to: 1.3 1.3 1.3"
          ></a-sphere>

          <!-- GOLD FRAME RODS -->
          <a-cylinder
            position="0.25 0 0"
            radius="0.01"
            height="0.65"
            color="#FFD700"
          ></a-cylinder>
          <a-cylinder
            position="-0.25 0 0"
            radius="0.01"
            height="0.65"
            color="#FFD700"
          ></a-cylinder>
          <a-cylinder
            position="0 0 0.25"
            radius="0.01"
            height="0.65"
            color="#FFD700"
          ></a-cylinder>
          <a-cylinder
            position="0 0 -0.25"
            radius="0.01"
            height="0.65"
            color="#FFD700"
          ></a-cylinder>

          <!-- BOTTOM RING -->
          <a-torus
            position="0 -0.35 0"
            radius="0.18"
            radius-tubular="0.01"
            color="#FFD700"
            rotation="90 0 0"
          ></a-torus>
          <!-- BOTTOM HOLDER -->
          <a-cylinder
            position="0 -0.45 0"
            radius="0.05"
            height="0.12"
            color="#FFD700"
          ></a-cylinder>

          <!-- TASSELS -->
          <a-cylinder
            position="0.08 -0.65 0"
            radius="0.005"
            height="0.25"
            color="#ffcc00"
          ></a-cylinder>
          <a-cylinder
            position="-0.08 -0.65 0"
            radius="0.005"
            height="0.25"
            color="#ffcc00"
          ></a-cylinder>
          <a-cylinder
            position="0 -0.65 0.08"
            radius="0.005"
            height="0.25"
            color="#ffcc00"
          ></a-cylinder>
          <a-cylinder
            position="0 -0.65 -0.08"
            radius="0.005"
            height="0.25"
            color="#ffcc00"
          ></a-cylinder>

          <!-- LIGHT -->
          <a-light
            type="point"
            color="#ffbb33"
            intensity="3"
            distance="10"
            position="0 0 0"
          ></a-light>

          <!-- AMBIENT GLOW -->
          <a-light type="ambient" color="#553300" intensity="0.8"></a-light>
        </a-entity>
      </a-marker>

      <!-- CAMERA -->
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
