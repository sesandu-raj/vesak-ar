<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Vesak Lantern AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* ─────────────────────────────────────────────
       THE KEY FIX:
       AR.js injects <video> with a fixed pixel size
       (e.g. width=640 height=480) which makes it
       smaller than the screen and off-centre.
       We use transform+translate to centre it and
       scale it up to cover the full viewport.
    ───────────────────────────────────────────── */
      video {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        /* centre it */
        transform: translate(-50%, -50%) !important;
        /* fill screen regardless of intrinsic size */
        min-width: 100vw !important;
        min-height: 100vh !important;
        width: auto !important;
        height: auto !important;
        object-fit: cover !important;
        z-index: 0 !important;
      }

      canvas {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 1 !important;
      }

      a-scene {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
      }

      /* ── Splash ── */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: radial-gradient(
          ellipse at 50% 35%,
          #200500,
          #0a0100 60%,
          #000
        );
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        transition: opacity 1s ease;
        font-family: Georgia, serif;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      .sp-lantern {
        width: 60px;
        height: 90px;
        position: relative;
        animation: sp-sway 2.5s ease-in-out infinite;
        transform-origin: top center;
      }
      .sp-lantern::before {
        content: "";
        position: absolute;
        top: 10px;
        left: 6px;
        right: 6px;
        bottom: 14px;
        background: radial-gradient(
          ellipse at 50% 30%,
          #ffe566,
          #ff6600 55%,
          #aa1100
        );
        border-radius: 40% 40% 50% 50%;
        box-shadow:
          0 0 22px 8px rgba(255, 150, 0, 0.8),
          0 0 50px 18px rgba(255, 60, 0, 0.4);
        animation: sp-glow 1.6s ease-in-out infinite alternate;
      }
      .sp-lantern::after {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 12px;
        background: #ffd700;
      }
      @keyframes sp-sway {
        0%,
        100% {
          transform: rotate(-6deg);
        }
        50% {
          transform: rotate(6deg);
        }
      }
      @keyframes sp-glow {
        from {
          box-shadow:
            0 0 22px 8px rgba(255, 150, 0, 0.8),
            0 0 50px 18px rgba(255, 60, 0, 0.4);
        }
        to {
          box-shadow:
            0 0 35px 14px rgba(255, 200, 0, 1),
            0 0 70px 28px rgba(255, 90, 0, 0.6);
        }
      }

      #splash h1 {
        color: #ffd700;
        font-size: 1.3rem;
        font-weight: normal;
        letter-spacing: 0.18em;
        text-shadow: 0 0 18px rgba(255, 215, 0, 0.7);
      }
      #splash p {
        color: rgba(255, 200, 80, 0.5);
        font-size: 0.7rem;
        letter-spacing: 0.25em;
      }

      .sp-bar {
        width: 160px;
        height: 1px;
        background: rgba(255, 215, 0, 0.15);
        position: relative;
        overflow: hidden;
      }
      .sp-bar::after {
        content: "";
        position: absolute;
        top: 0;
        left: -40%;
        width: 40%;
        height: 100%;
        background: linear-gradient(
          to right,
          transparent,
          #ffd700,
          transparent
        );
        animation: sp-sweep 1.8s ease-in-out infinite;
      }
      @keyframes sp-sweep {
        to {
          left: 140%;
        }
      }

      /* ── HUD ── */
      #hud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 100;
        padding: 14px 18px;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.65),
          transparent
        );
        display: none;
        pointer-events: none;
        justify-content: space-between;
        align-items: center;
        font-family: Georgia, serif;
      }
      #hud.show {
        display: flex;
      }
      #hud h2 {
        color: #ffd700;
        font-size: 0.95rem;
        font-weight: normal;
        letter-spacing: 0.08em;
        text-shadow: 0 0 12px rgba(255, 215, 0, 0.9);
      }
      #hud p {
        color: rgba(255, 200, 80, 0.45);
        font-size: 0.58rem;
        letter-spacing: 0.18em;
        margin-top: 2px;
      }
      .badge {
        border: 1px solid rgba(255, 215, 0, 0.5);
        background: rgba(255, 215, 0, 0.08);
        color: #ffd700;
        font-size: 0.62rem;
        letter-spacing: 0.1em;
        padding: 4px 12px;
        border-radius: 20px;
        animation: bdg 2s ease-in-out infinite;
      }
      @keyframes bdg {
        0%,
        100% {
          opacity: 0.5;
        }
        50% {
          opacity: 1;
        }
      }

      #tip {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(8px);
        border: 1px solid rgba(255, 215, 0, 0.3);
        border-radius: 24px;
        padding: 9px 22px;
        color: rgba(255, 220, 100, 0.9);
        font-size: 0.75rem;
        letter-spacing: 0.1em;
        white-space: nowrap;
        z-index: 100;
        font-family: Georgia, serif;
        transition: opacity 0.8s;
      }
      #tip.hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

      <div class="sp-bar"></div>
    </div>

    <script>
      // Splash → HUD transition
      setTimeout(() => {
        document.getElementById("splash").classList.add("hide");
        setTimeout(() => {
          document.getElementById("splash").style.display = "none";
          document.getElementById("hud").classList.add("show");
        }, 1000);
      }, 3000);

      setTimeout(
        () => document.getElementById("tip").classList.add("hide"),
        8000,
      );

      // ── Video full-screen fix ──
      // AR.js sets pixel width/height attributes on the video after injecting it.
      // We watch for it with MutationObserver and immediately override with CSS.
      function coverVideo(v) {
        // Remove any inline size attributes AR.js sets
        v.removeAttribute("width");
        v.removeAttribute("height");
        // Apply cover styles inline (overrides everything)
        v.style.position = "fixed";
        v.style.top = "50%";
        v.style.left = "50%";
        v.style.transform = "translate(-50%, -50%)";
        v.style.minWidth = "100vw";
        v.style.minHeight = "100vh";
        v.style.width = "auto";
        v.style.height = "auto";
        v.style.objectFit = "cover";
        v.style.zIndex = "0";
      }

      // Observe DOM for AR.js injecting the video
      const observer = new MutationObserver(() => {
        document.querySelectorAll("video").forEach(coverVideo);
      });
      observer.observe(document.body, { childList: true, subtree: true });

      // Also watch for AR.js changing attributes on existing video elements
      const attrObserver = new MutationObserver(() => {
        document.querySelectorAll("video").forEach(coverVideo);
      });

      // Start watching once scene is ready
      document.querySelector("a-scene").addEventListener("loaded", () => {
        document.querySelectorAll("video").forEach((v) => {
          coverVideo(v);
          attrObserver.observe(v, { attributes: true });
        });
      });

      // Fallback polling
      [100, 300, 600, 1000, 2000, 4000].forEach((t) =>
        setTimeout(
          () => document.querySelectorAll("video").forEach(coverVideo),
          t,
        ),
      );
    </script>
